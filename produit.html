  <style>
    .page-wrap{padding-top:var(--nav-h,64px)}

    /* ── BREADCRUMB ───────────────────── */
    .breadcrumb{padding:.8rem 5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;font-size:.72rem;color:var(--muted2);background:var(--surface)}

    /* ── HERO ─────────────────────────── */

    .p-hero-label{font-family:var(--font-mono,'Barlow Condensed'),sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
    .p-hero-label::before{content:'';display:block;width:20px;height:1px;background:var(--blue)}
    .p-hero h1{font-family:var(--font-display,'Barlow Condensed'),sans-serif;font-weight:800;font-size:clamp(3rem,8vw,6rem);line-height:.92;letter-spacing:-.03em;text-transform:uppercase;margin-bottom:.6rem}
    .p-hero h1 em{font-style:italic;font-weight:300;color:var(--blue-light,#42A5F5);display:block}
    .p-hero-tagline{font-size:1rem;color:var(--text2);line-height:1.7;max-width:480px;margin-bottom:2rem}
    .p-hero-badges{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2.5rem}
    .p-badge{font-family:var(--font-mono,'Barlow Condensed'),sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.25rem .7rem;border-radius:100px}
    .p-badge-blue{background:rgba(33,150,243,.12);border:1px solid rgba(33,150,243,.25);color:var(--blue-light,#42A5F5)}
    .p-badge-green{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);color:var(--green)}
    .p-hero-stats{display:flex;gap:2.5rem;flex-wrap:wrap}
    .phs-item .phs-val{font-family:var(--font-display,'Barlow Condensed'),sans-serif;font-weight:800;font-size:2.2rem;color:var(--text);line-height:1}
    .phs-item .phs-val span{color:var(--blue-light,#42A5F5)}

    /* ── BUY CARD ─────────────────────── */
    .p-hero-right{position:relative;z-index:1}
    .buy-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:sticky;top:calc(var(--nav-h,64px) + 1.5rem)}
    .buy-card-head{background:var(--surface2);border-bottom:1px solid var(--border);padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
    .buy-card-cat{font-family:var(--font-mono,'Barlow Condensed'),sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2)}

    .buy-variants-label{font-family:var(--font-mono,'Barlow Condensed'),sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted2);margin-bottom:.5rem}

    .buy-pack-includes{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.3rem}

    .buy-features{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}

    .section-tag{font-family:var(--font-mono,'Barlow Condensed'),sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
    .section-tag::before{content:'';display:block;width:1rem;height:1px;background:var(--blue)}
    .section-title-big{font-family:var(--font-display,'Barlow Condensed'),sans-serif;font-weight:700;font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.05;margin-bottom:2rem}
    .section-title-big em{font-style:italic;font-weight:300;color:var(--blue-light,#42A5F5)}

    /* ── BENEFITS ─────────────────────── */
    .p-benefits{padding:5rem;border-bottom:1px solid var(--border)}
    .benefits-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:2.5rem}

    /* ── PROCESS ─────────────────────── */

    /* ── FAQ ─────────────────────────── */
    .p-faq{padding:5rem;border-bottom:1px solid var(--border)}
    .faq-list{display:flex;flex-direction:column;gap:.5rem;margin-top:2.5rem;max-width:760px}

    .related-card{background:var(--surface);padding:1.5rem;display:flex;flex-direction:column;gap:.5rem;text-decoration:none;transition:background .2s;cursor:pointer}
    .related-card:hover{background:var(--surface2)}
    .related-card-icon{font-size:1.5rem;margin-bottom:.3rem}
    .related-card-cat{font-family:var(--font-mono,'Barlow Condensed'),sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted2)}
    .related-card-name{font-family:var(--font-display,'Barlow Condensed'),sans-serif;font-weight:700;font-size:1rem;text-transform:uppercase;color:var(--text)}
    .related-card-price{font-family:var(--font-display,'Barlow Condensed'),sans-serif;font-weight:800;font-size:1.2rem;color:var(--blue-light,#42A5F5);margin-top:auto}

    /* ── CTA ─────────────────────────── */
    .p-cta{padding:5rem;text-align:center;position:relative;overflow:hidden}
    .p-cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(33,150,243,.06),transparent)}
    .p-cta h2{font-family:var(--font-display,'Barlow Condensed'),sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3.5rem);line-height:.95;text-transform:uppercase;margin-bottom:1rem;position:relative}
    .p-cta h2 em{font-style:italic;font-weight:300;color:var(--blue-light,#42A5F5)}
    .p-cta p{color:var(--muted);font-size:.9rem;max-width:500px;margin:0 auto 2rem;position:relative}
    .cta-actions{display:flex;align-items:center;justify-content:center;gap:.8rem;flex-wrap:wrap;position:relative}
    .btn-primary{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;font-family:var(--font-mono,'Barlow Condensed'),sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:var(--blue);color:#fff;border:none;border-radius:3px;text-decoration:none;transition:background .15s;cursor:pointer}
    .btn-primary:hover{background:var(--blue-light,#42A5F5)}
    .btn-outline{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;font-family:var(--font-mono,'Barlow Condensed'),sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:3px;text-decoration:none;transition:all .15s;cursor:pointer}
    .btn-outline:hover{border-color:rgba(33,150,243,.4);color:var(--blue)}

    /* ── GEO BAR ─────────────────────── */
    .geo-bar{padding:1.2rem 5rem;border-top:1px solid var(--border);background:var(--surface)}
    .geo-bar-label{font-family:var(--font-mono,'Barlow Condensed'),sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted2);margin-bottom:.7rem}
    .geo-tags{display:flex;flex-wrap:wrap;gap:.4rem}
    .geo-tag{font-size:.78rem;color:var(--muted);text-decoration:none;padding:.3rem .7rem;border:1px solid var(--border);border-radius:4px;transition:border-color .15s,color .15s}

    /* ── ERROR ───────────────────────── */
    .not-found{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem;text-align:center;padding:3rem}

<script>
/* ═══════════════════════════════════
   produit.html — Template universel
   Chargement depuis products.js
   ═══════════════════════════════════ */

const CAT_LABELS = {
  prestation: 'Prestation',
  pack: 'Pack combiné',
  produit: 'Produit physique',
  cadeau: 'Bon cadeau'
};

function badgeColor(style) {
  const map = { popular:'background:var(--blue);color:#fff', eco:'background:var(--green);color:#000', gift:'background:var(--amber);color:#000', pack:'background:linear-gradient(90deg,var(--blue),var(--blue-light,#42A5F5));color:#fff', physique:'background:var(--surface3);color:var(--text2);border:1px solid var(--border2)' };
  return map[style] || 'background:var(--blue);color:#fff';
}

function renderPage(p) {
  // ── SEO ─────────────────────────────
  document.getElementById('page-title').textContent = p.seoTitle || p.name + ' — AREPROG';
  document.getElementById('page-desc').content = p.seoDesc || p.shortDesc;
  document.getElementById('page-canonical').href = 'https://areprog.fr/produit.html?id=' + p.id;
  document.getElementById('og-title').content = p.seoTitle || p.name;
  document.getElementById('og-desc').content = p.seoDesc || p.shortDesc;

  // ── RELATED ─────────────────────────
  const related = getRelatedProducts(p, 3);
  const relatedHTML = related.length ? `
    <section class="p-related">
      <div class="section-tag">Vous pourriez aussi aimer</div>
      <div class="section-title-big">Produits <em>associés</em></div>
      <div class="related-grid">
        ${related.map(r => `
          <a class="related-card" href="produit.html?id=${r.id}">
            <div class="related-card-icon">${r.icon}</div>
            <div class="related-card-cat">${CAT_LABELS[r.category]||r.category}</div>
            <div class="related-card-name">${r.name}</div>
            <div class="related-card-price">${r.priceLabel?r.priceLabel+' ':''}${r.price.toLocaleString('fr-FR')} €</div>
          </a>`).join('')}
      </div>
    </section>` : '';

  // ── VARIANTS ────────────────────────
  const variantsHTML = p.variants ? `
    <div class="buy-variants">
      <div class="buy-variants-label">Motorisation</div>
      <div class="buy-variant-btns">
        ${p.variants.map((v,i) => `<button class="var-btn${i===0?' selected':''}" data-price="${v.price}" data-label="${v.label}">${v.label}</button>`).join('')}
      </div>
    </div>` : '';

  // ── PACK INCLUDES ────────────────────
  const includesHTML = p.includes ? `
    <div class="buy-pack-includes">${p.includes.map(t=>`<span class="buy-pack-tag">${t}</span>`).join('')}</div>` : '';

  // ── SAVING ──────────────────────────
  const savingHTML = p.saving ? `<div class="buy-saving">✓ ${p.saving}</div>` : '';

  // ── PROCESS ─────────────────────────
  const processHTML = p.process ? `
    <section class="p-process">
      <div class="section-tag">Déroulement</div>
      <div class="section-title-big">Comment ça <em>se passe</em></div>
      <div class="process-grid">
        ${p.process.map(s=>`
          <div class="process-step">
            <div class="process-num">Étape ${s.step}</div>
            <div class="process-title">${s.title}</div>
            <p class="process-desc">${s.desc}</p>
          </div>`).join('')}
      </div>
    </section>` : '';

  // ── FAQ ──────────────────────────────
  const faqHTML = p.faq && p.faq.length ? `
    <section class="p-faq">
      <div class="section-tag">Questions fréquentes</div>
      <div class="section-title-big">Vos questions <em>sur ${p.name}</em></div>
      <div class="faq-list">
        ${p.faq.map(f=>`
          <div class="faq-item">
            <button class="faq-q" aria-expanded="false"><span class="faq-q-text">${f.q}</span><span class="faq-q-icon" aria-hidden="true">+</span></button>
            <div class="faq-a"><p>${f.a}</p></div>
          </div>`).join('')}
      </div>
    </section>` : '';

  const html = `
    <!-- BREADCRUMB -->
    <nav class="breadcrumb" aria-label="breadcrumb">
      <a href="index.html">Accueil</a>
      <span class="breadcrumb-sep">›</span>
      <a href="boutique.html">Boutique</a>
      <span class="breadcrumb-sep">›</span>
      <span style="color:var(--text2)">${p.name}</span>
    </nav>

    <!-- HERO -->
    <div class="p-hero">
      <div class="p-hero-left">
        <div class="p-hero-label">${CAT_LABELS[p.category]||p.category}</div>
        <h1>${p.icon} ${p.name.split(' ').slice(0,2).join('<br>')}<em>${p.name.split(' ').slice(2).join(' ')||p.tagline}</em></h1>
        <p class="p-hero-tagline">${p.shortDesc}</p>
        <div class="p-hero-badges">
          <span class="p-badge p-badge-blue">✓ Intervention à domicile</span>
          <span class="p-badge p-badge-blue">✓ Devis sous 24h</span>
          ${p.category==='prestation'||p.category==='pack'?'<span class="p-badge p-badge-green">✓ Garantie 2 ans</span>':''}
        </div>
        ${p.benefits ? `
        <div class="p-hero-stats">
          ${p.benefits.slice(0,2).map((b,i)=>`
            ${i>0?'<div class="phs-sep"></div>':''}
            <div class="phs-item">
              <div class="phs-val">${b.icon}</div>
              <div class="phs-label">${b.label}</div>
            </div>`).join('')}
        </div>` : ''}
      </div>

      <!-- BUY CARD -->
      <div class="p-hero-right">
        <div class="buy-card">
          <div class="buy-card-head">
            <span class="buy-card-cat">${CAT_LABELS[p.category]||p.category}</span>
            ${p.badge?`<span class="buy-card-badge" style="${badgeColor(p.badgeStyle)}">${p.badge}</span>`:''}
          </div>
          <div class="buy-card-body">
            ${p.priceLabel?`<div class="buy-price-label">${p.priceLabel}</div>`:''}
            <div class="buy-price" id="hero-price">${p.price.toLocaleString('fr-FR')} <sup>€</sup>${p.saving?`<span class="buy-price-was">${(p.price+parseInt(p.saving.match(/\d+/)[0])).toLocaleString('fr-FR')}€</span>`:''}</div>
            <div class="buy-price-unit">${p.priceUnit||''}</div>
            ${variantsHTML}
            ${includesHTML}
            ${savingHTML}
            <div class="buy-features">
              ${(p.features||[]).map(f=>`<div class="buy-feature">${f}</div>`).join('')}
            </div>
            <a href="${p.stripeLink}" class="btn-stripe" id="stripe-btn">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              Commander — ${p.price.toLocaleString('fr-FR')} €
            </a>
            <a href="contact.html" class="btn-devis">
              <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
              Devis gratuit plutôt
            </a>
            <div class="stripe-secure">
              <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              Paiement sécurisé Stripe
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DESCRIPTION -->
    <section class="p-desc">
      <div class="section-tag">${CAT_LABELS[p.category]||p.category} — AREPROG</div>
      <div class="p-desc-grid">
        <div>
          <h2>En quoi consiste<br><em>${p.name} ?</em></h2>
          <p>${p.fullDesc}</p>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:2rem">
          <div class="section-tag" style="margin-bottom:1.2rem">Inclus dans cette prestation</div>
          <div style="display:flex;flex-direction:column;gap:.6rem">
            ${(p.features||[]).map(f=>`<div style="font-size:.85rem;color:var(--text2);line-height:1.6;padding:.8rem;background:var(--surface2);border-radius:4px;display:flex;align-items:center;gap:.6rem"><span style="color:var(--green);font-weight:700">✓</span>${f}</div>`).join('')}
          </div>
        </div>
      </div>
    </section>

    <!-- BENEFITS -->
    ${p.benefits ? `
    <section class="p-benefits">
      <div class="section-tag">Avantages</div>
      <div class="section-title-big">Pourquoi choisir<br><em>${p.name} ?</em></div>
      <div class="benefits-grid">
        ${p.benefits.map(b=>`
          <div class="benefit-card">
            <div class="benefit-icon">${b.icon}</div>
            <div class="benefit-label">${b.label}</div>
            <div class="benefit-desc">${b.desc}</div>
          </div>`).join('')}
      </div>
    </section>` : ''}

    <!-- PROCESS -->
    ${processHTML}

    <!-- FAQ -->
    ${faqHTML}

    <!-- RELATED -->
    ${relatedHTML}

    <!-- CTA -->
    <section class="p-cta">
      <div class="section-tag" style="justify-content:center">${p.name} — AREPROG</div>
      <h2>Prêt à passer<br><em>commande ?</em></h2>
      <p>Paiement sécurisé Stripe, intervention à domicile confirmée sous 24h.</p>
      <div class="cta-actions">
        <a href="${p.stripeLink}" class="btn-primary">
          Commander — ${p.price.toLocaleString('fr-FR')} €
        </a>
        <a href="boutique.html" class="btn-outline">Voir la boutique</a>
        <a href="contact.html" class="btn-outline">Devis gratuit</a>
      </div>
    </section>

    <!-- GEO -->
    <div class="geo-bar">
      <div class="geo-bar-label">Zones d'intervention</div>
      <div class="geo-tags">
        <a href="reprogrammation-moteur-bayonne.html" class="geo-tag">Bayonne</a>
        <a href="reprogrammation-moteur-biarritz.html" class="geo-tag">Biarritz</a>
        <a href="reprogrammation-moteur-anglet.html" class="geo-tag">Anglet</a>
        <a href="reprogrammation-moteur-pau.html" class="geo-tag">Pau</a>
        <a href="reprogrammation-moteur-auxerre.html" class="geo-tag">Auxerre & Yonne</a>
        <a href="tarifs.html" class="geo-tag">Tarifs 2026</a>
        <a href="faq.html" class="geo-tag">FAQ</a>
        <a href="boutique.html" class="geo-tag">Boutique</a>
      </div>
    </div>
  `;

  document.getElementById('page-wrap').innerHTML = html;

  // ── FAQ interactivity ──────────────
  document.querySelectorAll('.faq-q').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = btn.closest('.faq-item');
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    });
  });

  // ── Variants ──────────────────────
  document.querySelectorAll('.var-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.var-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      const price = parseInt(btn.dataset.price);
      const label = btn.dataset.label;
      document.getElementById('hero-price').innerHTML = `${price.toLocaleString('fr-FR')} <sup>€</sup>`;
      const stripeBtn = document.getElementById('stripe-btn');
      if (stripeBtn) stripeBtn.textContent = `Commander — ${price.toLocaleString('fr-FR')} €`;
    });
  });

  // ── Stripe link check ──────────────
  const stripeBtn = document.getElementById('stripe-btn');
  if (stripeBtn && p.stripeLink && p.stripeLink.includes('VOTRE_LIEN')) {
    stripeBtn.href = 'contact.html';
    stripeBtn.querySelector ? null : null;
  }
}

function renderNotFound(id) {
  document.getElementById('page-wrap').innerHTML = `
    <div class="not-found">
      <h1>Produit introuvable</h1>
      <p>Le produit "${id||''}" n'existe pas dans le catalogue.</p>
      <a href="boutique.html" class="btn-primary" style="margin-top:1rem">Voir la boutique</a>
    </div>`;
}

// ── INIT ──────────────────────────────
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
if (!id) {
  renderNotFound('');
} else {
  const product = getProductById(id);
  if (product) renderPage(product);
  else renderNotFound(id);
}
</script>
</body>
</html>
