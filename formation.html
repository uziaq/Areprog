<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formation Cartographie ECU &#8212; Apprendre la reprogrammation moteur | AREPROG</title>
  <meta name="description" content="Formation interactive cartographie ECU diesel et essence. 7 niveaux progressifs, exercices pratiques type WinOLS, simulation logs moteur. Devenez autonome en calibration ECU."/>
  <link rel="canonical" href="https://areprog.fr/formation"/>
  <meta name="robots" content="index, follow"/>
  <meta property="og:title" content="Formation Cartographie ECU | AREPROG"/>
  <meta property="og:description" content="Formation interactive cartographie ECU diesel et essence. 7 niveaux, simulation WinOLS, logs moteur réalistes."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://areprog.fr/formation"/>
  <meta property="og:image" content="https://areprog.fr/og-image.webp"/>
  <meta property="og:locale" content="fr_FR"/>
  <meta property="og:site_name" content="AREPROG"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;1,300&family=Barlow:wght@300;400;500;600&display=swap"/>
  <link rel="stylesheet" href="/shared.css"/>
  <link rel="stylesheet" href="/formation.css"/>
</head>
<body data-page="formation">
<div id="nav-container"></div>

<div class="page-wrap">

  <!-- HERO -->
  <section class="fm-hero">
    <div class="fm-hero-grid" aria-hidden="true"></div>
    <div class="fm-hero-content">
      <div class="fm-hero-badge">Formation professionnelle</div>
      <h1 class="display">Formation<br><em>Cartographie ECU</em></h1>
      <p class="fm-hero-sub">7 niveaux progressifs &mdash; Diesel &amp; Essence &mdash; Simulation WinOLS</p>
      <div class="fm-hero-features">
        <div class="fm-hero-feature"><span class="fm-feature-dot fm-dot-diesel"></span>Moteur diesel common rail</div>
        <div class="fm-hero-feature"><span class="fm-feature-dot fm-dot-gasoline"></span>Moteur essence turbo</div>
        <div class="fm-hero-feature"><span class="fm-feature-dot fm-dot-log"></span>Logs moteur simulés</div>
        <div class="fm-hero-feature"><span class="fm-feature-dot fm-dot-ai"></span>Correction IA</div>
      </div>
      <button class="fm-btn fm-btn-primary fm-btn-lg" id="fm-hero-start">Démarrer la formation</button>
    </div>
  </section>

  <!-- SPA APP CONTAINER -->
  <div id="fm-app" class="fm-app hidden">

    <!-- Screen: Dashboard -->
    <div id="fm-screen-dashboard" class="fm-screen"></div>

    <!-- Screen: Level detail -->
    <div id="fm-screen-level" class="fm-screen hidden"></div>

    <!-- Screen: Exercise -->
    <div id="fm-screen-exercise" class="fm-screen hidden"></div>

    <!-- Screen: Result -->
    <div id="fm-screen-result" class="fm-screen hidden"></div>

  </div>

</div>

<!-- Raw block ECU dump overlay (Level 7) -->
<div id="fm-overlay-raw" class="fm-overlay hidden">
  <div class="fm-overlay-header">
    <h3>Bloc ECU brut &mdash; Mode expert</h3>
    <button class="fm-overlay-close" id="fm-overlay-close">Fermer</button>
  </div>
  <div class="fm-overlay-body" id="fm-raw-viewer-wrap"></div>
</div>

<!-- AI Feedback modal -->
<div id="fm-modal-ai" class="fm-modal hidden" role="dialog" aria-modal="true" aria-label="Correction formateur IA">
  <div class="fm-modal-backdrop" onclick="FM_UI && FM_UI.closeAIModal()"></div>
  <div class="fm-modal-inner"></div>
</div>

<!-- Toast notification -->
<div id="fm-toast" class="fm-toast hidden" aria-live="polite"></div>

<div id="footer-container"></div>

<script src="/nav.js"></script>
<script src="/formation-data.js"></script>
<script src="/formation-generators.js"></script>
<script src="/formation-engine.js"></script>
<script src="/formation-ui.js"></script>
<script>
  // Hero CTA: scroll to app and start
  document.getElementById('fm-hero-start').addEventListener('click', function() {
    var app = document.getElementById('fm-app');
    var hero = document.querySelector('.fm-hero');
    app.classList.remove('hidden');
    hero.style.display = 'none';
    app.scrollIntoView({ behavior: 'smooth' });
    if (window.FM_UI) window.FM_UI.showScreen('dashboard');
  });
</script>
</body>
</html>
