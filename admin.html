<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AREPROG — Connexion</title>
<meta name="robots" content="noindex, nofollow"/>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0c10;color:#e8eaf0;
  font-family:'Barlow',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(30,144,255,.12) 0%,transparent 70%);
}
.box{text-align:center;padding:40px}
.logo{font-family:'Barlow Condensed',system-ui,sans-serif;font-size:32px;font-weight:800;letter-spacing:3px;color:#fff;margin-bottom:8px}
.logo span{color:#1E90FF}
.msg{color:#7a8099;font-size:14px;margin-top:12px}
.spinner{
  width:32px;height:32px;border:3px solid rgba(30,144,255,.2);
  border-top-color:#1E90FF;border-radius:50%;
  animation:spin .8s linear infinite;margin:20px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">ARE<span>PROG</span></div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Validation en cours…</div>
</div>
<script>
// Ce script intercepte tous les tokens Netlify Identity dans l'URL
// (invitation, récupération de mot de passe, confirmation email)
// et les transmet au widget avant de rediriger vers /devis

netlifyIdentity.on('init', function(user) {
  // Si déjà connecté, rediriger directement
  if (user) {
    window.location.href = '/devis';
  }
});

netlifyIdentity.on('login', function() {
  document.getElementById('msg').textContent = 'Connecté ! Redirection…';
  setTimeout(function() {
    window.location.href = '/devis';
  }, 800);
});

netlifyIdentity.on('error', function(err) {
  document.getElementById('msg').textContent = 'Erreur : ' + (err.message || 'Lien invalide ou expiré.');
});

// Ouvrir automatiquement le widget si un token est présent dans l'URL
// Netlify envoie les tokens sous forme de hash : #invite_token=... ou #recovery_token=...
if (window.location.hash && (
  window.location.hash.indexOf('invite_token') !== -1 ||
  window.location.hash.indexOf('recovery_token') !== -1 ||
  window.location.hash.indexOf('confirmation_token') !== -1 ||
  window.location.hash.indexOf('access_token') !== -1
)) {
  // Le widget Netlify Identity lit le hash automatiquement
  netlifyIdentity.open();
} else {
  // Pas de token — rediriger vers la page de connexion
  window.location.href = '/devis';
}
</script>
</body>
</html>
