<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e85d00;
    --accent2: #ff8c42;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --done: #2a9d5c;
    --active: #e85d00;
    --upcoming: #2a2a3a;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
    background-image:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(232,93,0,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 10% 80%, rgba(255,140,66,0.05) 0%, transparent 50%);
  }

  .container { max-width: 860px; margin: 0 auto; }

  header {
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
  }

  .stack-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--surface);
  }
  .pill.active { border-color: var(--accent); color: var(--accent2); }

  /* Timeline */
  .timeline { position: relative; }

  .timeline::before {
    content: '';
    position: absolute;
    left: 20px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, var(--accent) 0%, var(--border) 40%, transparent 100%);
  }

  .phase {
    position: relative;
    padding-left: 56px;
    margin-bottom: 8px;
  }

  .phase-dot {
    position: absolute;
    left: 12px;
    top: 22px;
    width: 17px;
    height: 17px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    z-index: 1;
    transition: all 0.3s;
  }

  .phase.status-current .phase-dot {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: 0 0 12px rgba(232,93,0,0.5);
  }

  .phase.status-done .phase-dot {
    border-color: var(--done);
    background: var(--done);
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: border-color 0.2s;
  }

  .phase.status-current .phase-header { border-color: rgba(232,93,0,0.4); }
  .phase.status-done .phase-header { border-color: rgba(42,157,92,0.3); }
  .phase-header:hover { border-color: var(--accent2); }

  .phase-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
  }

  .phase-title {
    font-size: 16px;
    font-weight: 700;
    flex: 1;
    letter-spacing: -0.01em;
  }

  .phase-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .duration {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .status-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .status-current .status-badge { background: rgba(232,93,0,0.15); color: var(--accent2); }
  .status-done .status-badge { background: rgba(42,157,92,0.15); color: #4ade80; }
  .status-upcoming .status-badge { background: var(--upcoming); color: var(--muted); }

  .chevron {
    color: var(--muted);
    transition: transform 0.3s;
    font-size: 12px;
  }

  .phase.open .chevron { transform: rotate(180deg); }

  .phase-body {
    display: none;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    background: var(--surface);
    overflow: hidden;
  }

  .phase.status-current .phase-body { border-color: rgba(232,93,0,0.2); }
  .phase.open .phase-body { display: block; }

  .task-list { padding: 4px 0 12px; }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s;
  }

  .task:last-child { border-bottom: none; }
  .task:hover { background: rgba(255,255,255,0.02); }

  .task-check {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  .task.done .task-check { background: var(--done); border-color: var(--done); color: white; }

  .task-content { flex: 1; }

  .task-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .task-desc {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    line-height: 1.5;
  }

  .task-tech {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    margin-top: 4px;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 20px 4px;
  }

  /* Progress bar */
  .progress-bar {
    margin-bottom: 40px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .progress-label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 12%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; }
  .progress-pct { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent2); white-space: nowrap; }

  .total-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    margin-top: 24px;
  }
  .total-time span { color: var(--text); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="tag">// roadmap projet</div>
    <h1>Boutique <span>remapping</span><br>de A à Z</h1>
    <p class="subtitle">GitHub → Netlify → Firebase · Stack existante conservée</p>
    <div class="stack-pills">
      <span class="pill active">GitHub</span>
      <span class="pill active">Netlify</span>
      <span class="pill active">Firebase</span>
      <span class="pill">Stripe</span>
      <span class="pill">Node.js / Express</span>
      <span class="pill">Firebase Functions</span>
    </div>
  </header>

  <div class="progress-bar">
    <span class="progress-label">Avancement global</span>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <span class="progress-pct">~0%</span>
  </div>

  <div class="timeline" id="timeline"></div>

  <p class="total-time">Durée totale estimée : <span>6 à 10 semaines</span> en travail régulier</p>

</div>

<script>
const phases = [
  {
    number: "01",
    title: "Fondations & architecture",
    duration: "1–2 jours",
    status: "current",
    sections: [
      {
        label: "Structure Firebase",
        tasks: [
          { name: "Collection products", desc: "Créer la structure Firestore : id, nom, prix, catégorie, stock, images, actif", tech: "Firestore" },
          { name: "Collection orders", desc: "Commandes avec statut, items, userId, stripeSessionId, timestamps", tech: "Firestore" },
          { name: "Collection customers", desc: "Données client liées à Firebase Auth (email, historique)", tech: "Firebase Auth" },
        ]
      },
      {
        label: "Règles de sécurité",
        tasks: [
          { name: "Firestore Security Rules", desc: "Protéger les collections : seuls les admins écrivent les produits, les users lisent leurs commandes", tech: "Firestore Rules" },
          { name: "Storage Rules", desc: "Sécuriser l'upload des images produits", tech: "Firebase Storage" },
        ]
      }
    ]
  },
  {
    number: "02",
    title: "Catalogue & fiches produits",
    duration: "3–5 jours",
    status: "upcoming",
    sections: [
      {
        label: "Pages frontend",
        tasks: [
          { name: "Page /boutique", desc: "Grille produits avec filtres (catégorie, marque, type de prestation)", tech: "HTML/CSS + Firestore SDK" },
          { name: "Page /produit/:id", desc: "Fiche détaillée, galerie photo, description, prix, CTA 'Ajouter au panier'", tech: "Dynamic routing" },
          { name: "Connexion simulateur", desc: "Lier un produit à son résultat de simulation — CTA sur le simulateur → fiche produit", tech: "Ton API Node.js" },
        ]
      },
      {
        label: "Back-office admin",
        tasks: [
          { name: "Page /admin/produits", desc: "Formulaire pour créer/éditer/supprimer des produits, upload images via Firebase Storage", tech: "Firebase Storage + Firestore" },
        ]
      }
    ]
  },
  {
    number: "03",
    title: "Panier & tunnel de commande",
    duration: "3–4 jours",
    status: "upcoming",
    sections: [
      {
        label: "Panier",
        tasks: [
          { name: "State panier local", desc: "Géré en localStorage ou context JS — persist entre pages, synchro si connecté", tech: "localStorage / JS" },
          { name: "Page /panier", desc: "Résumé des articles, quantités, sous-total, CTA vers le paiement", tech: "Firestore optionnel" },
        ]
      },
      {
        label: "Authentification",
        tasks: [
          { name: "Login / inscription", desc: "Firebase Auth (email+password ou Google OAuth) — obligatoire avant paiement", tech: "Firebase Auth" },
          { name: "Page /mon-compte", desc: "Historique commandes, téléchargements (si produit digital)", tech: "Firestore" },
        ]
      }
    ]
  },
  {
    number: "04",
    title: "Intégration paiement Stripe",
    duration: "3–5 jours",
    status: "upcoming",
    sections: [
      {
        label: "Backend paiement",
        tasks: [
          { name: "Firebase Function : createCheckoutSession", desc: "Génère une Stripe Checkout Session avec les items du panier — déployée sur Firebase Functions", tech: "Firebase Functions + Stripe SDK" },
          { name: "Firebase Function : stripeWebhook", desc: "Écoute les événements Stripe (payment_succeeded) et met à jour la commande Firestore", tech: "Webhook Stripe" },
          { name: "Variable d'environnement", desc: "Stocker la clé secrète Stripe dans Firebase config (jamais dans le code)", tech: "firebase functions:config:set" },
        ]
      },
      {
        label: "Frontend paiement",
        tasks: [
          { name: "Page /checkout", desc: "Bouton 'Payer' → appel à la Function → redirect vers Stripe Hosted Page", tech: "Stripe.js" },
          { name: "Page /confirmation", desc: "Récap commande après retour Stripe, affichage du lien de téléchargement si digital", tech: "Firestore" },
        ]
      }
    ]
  },
  {
    number: "05",
    title: "Livraison & notifications",
    duration: "2–3 jours",
    status: "upcoming",
    sections: [
      {
        label: "Produits digitaux (fichiers remap)",
        tasks: [
          { name: "Lien sécurisé de téléchargement", desc: "Générer une URL Firebase Storage signée (expires après 24h) envoyée par email", tech: "Firebase Storage signed URL" },
          { name: "Espace client téléchargements", desc: "Historique des fichiers achetés accessibles dans /mon-compte", tech: "Firestore" },
        ]
      },
      {
        label: "Emails automatiques",
        tasks: [
          { name: "Email de confirmation", desc: "Envoyé via Firebase Function après paiement (Resend ou Nodemailer + Gmail SMTP)", tech: "Resend / Nodemailer" },
          { name: "Email admin", desc: "Notification interne à chaque nouvelle commande", tech: "Resend" },
        ]
      }
    ]
  },
  {
    number: "06",
    title: "Déploiement & mise en ligne",
    duration: "1–2 jours",
    status: "upcoming",
    sections: [
      {
        label: "Config Netlify",
        tasks: [
          { name: "Variables d'environnement Netlify", desc: "Clés Stripe publiques, Firebase config → dans les env vars Netlify (pas dans le repo)", tech: "Netlify Dashboard" },
          { name: "Redirects pour routing SPA", desc: "Fichier _redirects ou netlify.toml pour les routes /boutique, /produit/:id, etc.", tech: "netlify.toml" },
        ]
      },
      {
        label: "Déploiement Firebase",
        tasks: [
          { name: "Deploy Firebase Functions", desc: "firebase deploy --only functions — webhook Stripe doit être accessible publiquement", tech: "Firebase CLI" },
          { name: "Déclarer webhook dans Stripe Dashboard", desc: "URL de la Function comme endpoint webhook, sélectionner l'event payment_intent.succeeded", tech: "Stripe Dashboard" },
        ]
      }
    ]
  },
  {
    number: "07",
    title: "Légal, SEO & optimisations",
    duration: "2–3 jours",
    status: "upcoming",
    sections: [
      {
        label: "Pages légales",
        tasks: [
          { name: "CGV & mentions légales", desc: "Obligatoires pour tout e-commerce en France — conditions de vente, délais, remboursements", tech: "" },
          { name: "Politique RGPD & cookies", desc: "Bannière cookies, données collectées, droits utilisateurs", tech: "" },
        ]
      },
      {
        label: "Qualité & performance",
        tasks: [
          { name: "SEO pages boutique", desc: "Balises title/meta dynamiques par produit, structured data (Product schema)", tech: "JSON-LD" },
          { name: "Optimisation images", desc: "WebP, lazy loading, CDN Firebase Storage", tech: "Firebase Storage" },
          { name: "Tests complets", desc: "Parcours d'achat de bout en bout en mode test Stripe, vérification webhooks, emails", tech: "Stripe test mode" },
        ]
      }
    ]
  }
];

const timeline = document.getElementById('timeline');

phases.forEach((phase, i) => {
  const el = document.createElement('div');
  el.className = `phase status-${phase.status}`;

  const statusLabels = { current: 'À démarrer', done: 'Terminé', upcoming: 'À venir' };

  let tasksHTML = '';
  phase.sections.forEach(section => {
    tasksHTML += `<div class="section-label">${section.label}</div>`;
    section.tasks.forEach(task => {
      tasksHTML += `
        <div class="task">
          <div class="task-check"></div>
          <div class="task-content">
            <div class="task-name">${task.name}</div>
            <div class="task-desc">${task.desc}</div>
            ${task.tech ? `<div class="task-tech">→ ${task.tech}</div>` : ''}
          </div>
        </div>`;
    });
  });

  el.innerHTML = `
    <div class="phase-dot"></div>
    <div class="phase-header" onclick="togglePhase(this)">
      <span class="phase-number">${phase.number}</span>
      <span class="phase-title">${phase.title}</span>
      <div class="phase-meta">
        <span class="duration">${phase.duration}</span>
        <span class="status-badge">${statusLabels[phase.status]}</span>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="phase-body">
      <div class="task-list">${tasksHTML}</div>
    </div>`;

  timeline.appendChild(el);

  // Open current phase by default
  if (phase.status === 'current') el.classList.add('open');
});

function togglePhase(header) {
  header.parentElement.classList.toggle('open');
}
</script>
</body>
</html>
